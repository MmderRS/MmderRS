<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站建设中 - 孟孟德尔的笔记</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      padding: 0 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    .title {
      font-size: 32px;
      color: #1e293b;
      margin-bottom: 16px;
    }

    .desc {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 24px;
      color: #4f46e5;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: #4f46e5;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.3s;
    }

    .back-btn:hover {
      background-color: #4338ca;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🚧</div>
    <h1 class="title">网站正在建设中</h1>
    <p class="desc">
      该页面尚未完成，正在努力开发中……<br>
      感谢你的耐心等待，敬请期待后续更新！
    </p>
    <a href="index.html" class="back-btn">返回首页</a>
  </div>

</body>
</html>
